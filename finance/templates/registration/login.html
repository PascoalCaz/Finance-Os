<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinanceOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1 { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-[#fafbfc] min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-sm bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-8">
        <div class="text-center mb-10">
            <div class="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center text-white font-bold mx-auto mb-4 shadow-lg shadow-blue-200">F</div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Bem-vindo de volta</h1>
            <p class="text-slate-400 text-sm mt-1">Acesse sua conta FinanceOS</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Usuário</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 text-slate-900 text-sm focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">Senha</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 text-slate-900 text-sm focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
            </div>
            
            {% if form.errors %}
            <p class="text-xs text-rose-500 font-medium text-center">Usuário ou senha inválidos.</p>
            {% endif %}

            <button type="submit" 
                    class="w-full bg-slate-900 text-white py-3.5 rounded-xl font-bold text-sm hover:bg-slate-800 active:scale-[0.98] transition-all shadow-lg shadow-slate-200">
                Entrar no Sistema
            </button>
        </form>
    </div>
</body>
</html>
