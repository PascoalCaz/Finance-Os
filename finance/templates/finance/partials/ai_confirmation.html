{% load l10n %}
<div class="flex justify-start mb-4 animate-in slide-in-from-bottom-2 duration-300">
    <div class="w-full max-w-[95%] sm:max-w-[85%] bg-white rounded-2xl p-4 shadow-sm border border-slate-200 rounded-tl-none">
        
        <div class="flex items-center space-x-2 mb-3">
            <div class="w-5 h-5 rounded-lg bg-slate-900 flex items-center justify-center text-white text-[10px] font-bold">F</div>
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Confirmação de Registo</span>
        </div>

        <form hx-post="/ai/confirm/" hx-target="#main-content" class="space-y-3">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[8px] font-bold text-slate-400 uppercase mb-0.5">Data</label>
                    <input type="date" name="Data" value="{{ parsed.Data }}" required class="w-full px-2 py-1.5 rounded-lg bg-slate-50 border border-slate-100 text-[11px] outline-none focus:ring-1 focus:ring-blue-500/30">
                </div>
                <div>
                    <label class="block text-[8px] font-bold text-slate-400 uppercase mb-0.5">Tipo</label>
                    <select name="Tipo" required class="w-full px-2 py-1.5 rounded-lg bg-slate-50 border border-slate-100 text-[11px] outline-none">
                        <option value="Despesa" {% if parsed.Tipo == "Despesa" %}selected{% endif %}>Despesa</option>
                        <option value="Receita" {% if parsed.Tipo == "Receita" %}selected{% endif %}>Receita</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-[8px] font-bold text-slate-400 uppercase mb-0.5">Descrição</label>
                <input type="text" name="Descricao" value="{{ parsed.Descricao }}" required class="w-full px-2 py-1.5 rounded-lg bg-slate-50 border border-slate-100 text-[11px] outline-none">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[8px] font-bold text-slate-400 uppercase mb-0.5">Valor (Kz)</label>
                    <input type="number" step="0.01" name="Valor" value="{{ parsed.Valor|unlocalize }}" required class="w-full px-2 py-1.5 rounded-lg bg-slate-50 border border-slate-100 text-[11px] font-bold outline-none">
                </div>
                <div>
                    <label class="block text-[8px] font-bold text-slate-400 uppercase mb-0.5">Categoria</label>
                    <select name="Categoria_id" class="w-full px-2 py-1.5 rounded-lg bg-slate-50 border border-slate-100 text-[11px] outline-none">
                        <option value="">Nenhuma</option>
                        {% for cat in categories %}
                        <option value="{{ cat.Id }}" {% if cat.Id == parsed.Categoria_id %}selected{% elif cat.nome == parsed.Categoria_nome %}selected{% endif %}>{{ cat.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="pt-2 flex justify-end">
                <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded-xl text-[11px] font-bold hover:bg-blue-500 shadow-md transition-all">
                    Confirmar Registo
                </button>
            </div>
        </form>
    </div>
</div>
