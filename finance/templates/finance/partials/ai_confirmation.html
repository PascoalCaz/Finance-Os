{% load l10n %}
<div class="p-6">
    <div class="flex items-center space-x-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-white">
            <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <div>
            <h3 class="text-lg font-bold text-slate-900">A IA interpretou isto:</h3>
            <p class="text-xs text-slate-400 font-medium whitespace-nowrap">Por favor, verifique antes de submeter</p>
        </div>
    </div>

    <!-- Formulário de Confirmação da IA -->
    <form hx-post="/ai/confirm/" hx-target="#main-content" hx-on::after-request="closeModal()" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Data Detetada</label>
                <input type="date" name="Data" value="{{ parsed.Data }}" required class="w-full px-3 py-2 rounded-lg bg-slate-50 border border-slate-100 text-xs focus:ring-2 focus:ring-blue-500/20 outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tipo Identificado</label>
                <select name="Tipo" required class="w-full px-3 py-2 rounded-lg bg-slate-50 border border-slate-100 text-xs focus:ring-2 focus:ring-blue-500/20 outline-none">
                    <option value="Despesa" {% if parsed.Tipo == "Despesa" %}selected{% endif %}>Despesa</option>
                    <option value="Receita" {% if parsed.Tipo == "Receita" %}selected{% endif %}>Receita</option>
                </select>
            </div>
        </div>

        <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Descrição Sugerida</label>
            <input type="text" name="Descricao" value="{{ parsed.Descricao }}" required 
                   class="w-full px-3 py-2 rounded-lg bg-slate-50 border border-slate-100 text-xs focus:ring-2 focus:ring-blue-500/20 outline-none">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Valor Final (Kz)</label>
                <input type="number" step="0.01" name="Valor" value="{{ parsed.Valor|unlocalize }}" required 
                       class="w-full px-3 py-2 rounded-lg bg-slate-50 border border-slate-100 text-xs font-bold focus:ring-2 focus:ring-blue-500/20 outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Categoria Relacionada</label>
                <select name="Categoria_id" class="w-full px-3 py-2 rounded-lg bg-slate-50 border border-slate-100 text-xs focus:ring-2 focus:ring-blue-500/20 outline-none">
                    <option value="">Nenhuma</option>
                    {% for cat in categories %}
                    <option value="{{ cat.Id }}" {% if cat.Id == parsed.Categoria_id %}selected{% elif cat.nome == parsed.Categoria_nome %}selected{% endif %}>{{ cat.nome }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="pt-4 flex items-center justify-end space-x-3">
            <button type="button" onclick="closeModal()" class="px-4 py-2 text-xs font-bold text-slate-500 hover:text-slate-700">Descartar</button>
            <button type="submit" class="px-6 py-2 bg-slate-900 text-white rounded-lg text-xs font-bold hover:bg-slate-800 shadow-xl shadow-slate-200 transition-all">
                Confirmar e Registar
            </button>
        </div>
    </form>
</div>
