<div class="p-8 space-y-6">
    <!-- Cabeçalho do Chat -->
    <div class="flex items-center space-x-4 mb-2">
        <div class="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center text-white shadow-lg shadow-blue-100 animate-bounce">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
        </div>
        <div>
            <h3 class="text-lg font-bold text-slate-800 font-heading">Assistente Financeiro</h3>
            <p class="text-xs text-slate-500 font-medium">Preciso de um pequeno detalhe...</p>
        </div>
    </div>

    <!-- Mensagem da IA -->
    <div class="bg-slate-50 border border-slate-100 p-5 rounded-2xl relative animate-in fade-in slide-in-from-bottom-2 duration-500">
        <div class="absolute -top-2 left-6 w-4 h-4 bg-slate-50 border-t border-l border-slate-100 rotate-45"></div>
        <p class="text-sm text-slate-700 leading-relaxed font-medium">
            {{ message }}
        </p>
    </div>

    <!-- Formulário de Resposta -->
    <form hx-post="/ai/process/" hx-target="#modal-content" hx-indicator="#ai-loading-global" class="space-y-4">
        {% csrf_token %}
        <input type="hidden" name="is_chat" value="true">
        <input type="hidden" name="ai_auto" value="{{ auto_reg|lower }}">
        <input type="hidden" name="ai_provider" value="{{ request.session.ai_provider }}">
        
        <div class="relative group">
            <input type="text" name="ai_text" autofocus
                   placeholder="Escreva a sua resposta aqui..."
                   class="w-full bg-white border-2 border-slate-100 rounded-2xl px-5 py-4 text-sm focus:border-blue-500 focus:ring-4 focus:ring-blue-50/50 outline-none transition-all placeholder:text-slate-300">
            <div class="absolute right-2 top-2">
                <button type="submit" class="bg-blue-600 text-white p-2.5 rounded-xl hover:bg-blue-500 transition-all shadow-md">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>
        </div>
        
        <div class="flex items-center justify-between px-2">
            <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Pressione Enter para enviar</p>
            <button type="button" onclick="closeModal()" class="text-[10px] text-slate-400 hover:text-rose-500 font-bold uppercase tracking-widest transition-colors">Cancelar</button>
        </div>
    </form>
</div>
