<div class="flex {% if is_ai %}justify-start{% else %}justify-end{% endif %} mb-4 animate-in slide-in-from-bottom-2 duration-300">
    <div class="max-w-[85%] sm:max-w-[75%] rounded-2xl px-4 py-2.5 shadow-sm 
        {% if is_ai %}
            bg-slate-100 text-slate-800 rounded-tl-none border border-slate-200
        {% else %}
            bg-blue-600 text-white rounded-tr-none
        {% endif %}">
        
        {% if is_ai %}
        <div class="flex items-center space-x-2 mb-1">
            <div class="w-4 h-4 rounded-full bg-blue-600 flex items-center justify-center text-[10px] text-white font-bold">F</div>
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Assistente</span>
        </div>
        {% endif %}

        <div class="text-xs sm:text-sm leading-relaxed whitespace-pre-wrap">
            {{ response }}
        </div>
        
        <div class="text-[9px] mt-1 opacity-50 text-right">
            {% now "H:i" %}
        </div>
    </div>
</div>
