<div class="p-6">
    <div class="flex items-center space-x-3 mb-6">
        <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
        </div>
        <div>
            <h3 class="text-lg font-bold text-slate-900">Nova Categoria</h3>
            <p class="text-xs text-slate-400 font-medium">Adicione um novo grupo organizacional</p>
        </div>
    </div>

    <form hx-post="/categories/create/" hx-target="#main-content" hx-on::after-request="closeModal()" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nome da Categoria</label>
            <input type="text" name="nome" placeholder="Ex: Supermercado, Lazer, etc." required 
                   class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-100 text-xs font-medium focus:ring-2 focus:ring-blue-500/20 outline-none">
        </div>

        <div class="pt-4 flex items-center justify-end space-x-3">
            <button type="button" onclick="closeModal()" class="px-4 py-2 text-xs font-bold text-slate-500 hover:text-slate-700">Cancelar</button>
            <button type="submit" class="px-6 py-3 bg-blue-600 text-white rounded-xl text-xs font-bold hover:bg-blue-500 shadow-lg shadow-blue-100 transition-all">
                Criar Categoria
            </button>
        </div>
    </form>
</div>
