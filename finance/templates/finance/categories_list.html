{% extends "finance/base.html" %}
{% block content %}
<div data-title="Categorias" class="space-y-6 animate-in fade-in duration-500">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4 sm:mb-2">
        <div>
            <h2 class="text-lg sm:text-xl font-bold text-slate-800">Categorias Profissionais</h2>
            <p class="text-[10px] sm:text-xs text-slate-500 font-medium">Organize os seus gastos por grupos personalizados.</p>
        </div>
        <button hx-get="/categories/create/" hx-target="#modal-content"
                class="bg-blue-600 text-white px-4 sm:px-5 py-2 sm:py-2.5 rounded-xl text-xs font-bold hover:bg-blue-500 transition-all shadow-lg shadow-blue-100 flex items-center justify-center space-x-2 w-full sm:w-auto">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            <span>Nova Categoria</span>
        </button>
    </div>

    <!-- Grid de Categorias -->
    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
        {% for cat in categories %}
        <div hx-get="/transactions/?category_id={{ cat.Id }}" hx-target="#main-content" hx-push-url="true"
             class="card-dense group hover:border-blue-200 transition-colors cursor-pointer">
            <div class="flex items-start justify-between pointer-events-none">
                <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 mb-4 group-hover:bg-blue-600 group-hover:text-white transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                </div>
                <!-- No mobile o botão é sempre visível mas sutil -->
                <button hx-delete="/categories/delete/{{ cat.Id }}/" 
                        hx-confirm="Deseja apagar esta categoria?"
                        hx-target="#main-content"
                        onclick="event.stopPropagation()"
                        class="p-2 text-slate-200 hover:text-rose-500 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-all pointer-events-auto">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <h4 class="text-sm font-bold text-slate-800">{{ cat.nome }}</h4>
            <p class="text-[10px] text-slate-400 font-medium uppercase mt-1 tracking-wider">Ver transações</p>
        </div>
        {% empty %}
        <div class="col-span-full py-12 text-center text-slate-400 text-xs font-medium">Crie a sua primeira categoria para começar.</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
